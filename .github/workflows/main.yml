name: CNC Quality Blog Agent

on:
  schedule:
    # Monday, Wednesday, Friday at 10:00 AM UTC = 3:30 PM IST
    - cron: '0 10 * * 1,3,5'
  workflow_dispatch:

jobs:
  publish-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install node-fetch

      - name: Run CNC Blog Agent
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          IDEOGRAM_API_KEY: ${{ secrets.IDEOGRAM_API_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          BLOG_API_SECRET: ${{ secrets.BLOG_API_SECRET }}
          VERCEL_DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK }}
        run: node cnc-blog-agent.js

      - name: Done
        run: echo "✅ Quality blog published at $(date)"
